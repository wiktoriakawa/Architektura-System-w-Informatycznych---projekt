services:
  db:
    image: postgres:16-alpine
    container_name: te_db_dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trendeconomy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-trendeconomy_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-trendeconomy} -d $${POSTGRES_DB:-trendeconomy_db}"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: te_backend_dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trendeconomy}:${POSTGRES_PASSWORD:-secretpassword}@db:5432/${POSTGRES_DB:-trendeconomy_db}
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # Skrypt entrypoint.sh w razie OneDrive/Windows może mieć CRLF — uruchamiamy
    # go z dos2unix w locie, żeby nie wywalał się na "\r": command not found.
    entrypoint:
      - bash
      - -c
      - |
        dos2unix -q entrypoint.sh && bash entrypoint.sh --reload
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: te_frontend_dev
    environment:
      # W dev kierujemy fetch przeglądarki na backend wystawiony na host,
      # dzięki temu nie trzeba zmieniać kodu App.jsx (używa VITE_API_URL).
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Anonimowy wolumen na node_modules — chroni je przed nadpisaniem przez
      # bind mount z hosta (host nie ma node_modules, a kontener tak).
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata_dev:
