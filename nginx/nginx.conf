# ---------------------------------------------------------------------------
# Edge reverse proxy — wystawiony na porcie 80 hosta (docker-compose.prod.yml).
# Przekierowuje:
#   /api/*, /docs, /redoc, /openapi.json  -> backend:8000 (FastAPI)
#   /                                     -> frontend:80 (nginx ze statykami)
# ---------------------------------------------------------------------------

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logi w formacie nadającym się do parsowania (potrzebne do monitoringu).
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"duration_ms":$request_time,'
            '"upstream":"$upstream_addr"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    keepalive_timeout  65;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name localhost;

        # ----- Backend: API + dokumentacja Swagger -----
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location = /docs {
            proxy_pass http://backend;
        }

        location = /redoc {
            proxy_pass http://backend;
        }

        location = /openapi.json {
            proxy_pass http://backend;
        }

        # ----- Frontend: statyki React/Vite z drugiego kontenera nginx -----
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
