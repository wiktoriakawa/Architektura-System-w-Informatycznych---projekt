services:
  db:
    image: postgres:16-alpine
    container_name: te_db_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  backend:
    build:
      context: ./backend
    container_name: te_backend_prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      LOG_LEVEL: INFO
    entrypoint: ["bash", "entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      # Stage `prod` z Dockerfile = nginx alpine z gotowym bundle Vite.
      target: prod
    container_name: te_frontend_prod
    depends_on:
      - backend
    restart: always

  # Edge proxy — jedyny kontener wystawiony na port 80 hosta.
  # Przekierowuje / na frontend (nginx ze statykami) i /api/* na backend.
  nginx:
    image: nginx:alpine
    container_name: te_nginx_prod
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  pgdata_prod:
